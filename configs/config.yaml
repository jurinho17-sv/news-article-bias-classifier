data:
  baly_dir: data/raw/baly/jsons
  qbias_csv: data/raw/qbias/allsides_news_complete.csv
  processed_dir: data/processed
  train_file: data/processed/train.csv
  val_file: data/processed/val.csv
  test_file: data/processed/test.csv
  min_text_len: 50
  text_column: content
  label_column: label

model:
  name: microsoft/deberta-v3-base
  num_labels: 3
  max_seq_len: 512
  label2id:
    Left: 0
    Center: 1
    Right: 2
  id2label:
    0: Left
    1: Center
    2: Right

training:
  output_dir: checkpoints/deberta-v3-base-run1
  seed: 42
  batch_size: 16
  gradient_accumulation_steps: 2
  effective_batch_size: 32
  learning_rate: 2.0e-5
  num_epochs: 5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  class_weighting: balanced

wandb:
  project: news-bias-classifier
  entity: null
  run_name: deberta-v3-base-temporal-v1
  tags:
    - deberta-v3-base
    - temporal-split
    - baly-qbias

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - per_class_f1
    - confusion_matrix
  test_split: temporal
